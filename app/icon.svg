<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer eye shape -->
  <path
    d="M 2,16 C 6,7 26,7 30,16 C 26,25 6,25 2,16 Z"
    fill="none" stroke="#6C63FF" stroke-width="1.5"
  />
  <!-- Iris — 3D gradient ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#6C63FF" stroke-width="1.2" />
  <!-- Iris fill with depth -->
  <circle cx="16" cy="16" r="6.5" fill="#1a1040" />
  <!-- Iris color ring -->
  <circle cx="16" cy="16" r="5.5" fill="#6C63FF" opacity="0.85" />
  <!-- Inner ring for 3D depth -->
  <circle cx="16" cy="16" r="3.8" fill="#3d2fa0" />
  <!-- Pupil -->
  <circle cx="16" cy="16" r="2.2" fill="#000000" />
  <!-- Specular highlight — top-left -->
  <circle cx="13.8" cy="13.8" r="0.9" fill="#ffffff" opacity="0.9" />
  <!-- Small secondary highlight -->
  <circle cx="17.5" cy="15" r="0.4" fill="#ffffff" opacity="0.5" />
  <!-- Wireframe latitude lines (3D reconstruction feel) -->
  <ellipse cx="16" cy="16" rx="5.5" ry="2.2" fill="none" stroke="#9b95ff" stroke-width="0.4" opacity="0.5" />
  <ellipse cx="16" cy="16" rx="5.5" ry="4" fill="none" stroke="#9b95ff" stroke-width="0.3" opacity="0.25" />
  <!-- Wireframe meridian line -->
  <line x1="16" y1="10.5" x2="16" y2="21.5" stroke="#9b95ff" stroke-width="0.4" opacity="0.4" />
</svg>
